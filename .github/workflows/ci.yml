# CI 工作流：前端类型检查 + 构建、后端静态分析 + 测试、代码审查标准检查
# 所有 PR 必须通过此工作流才能合并

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # === 前端构建检查 ===
  ci-frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check & build
        run: pnpm run build

  # === 后端静态分析 ===
  ci-backend-static:
    name: Backend Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run mypy type check (strict mode)
        run: |
          python -m mypy app/ --config-file pyproject.toml
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///:memory:

      - name: Run batch replace validation script
        run: |
          python validate_batch_replace.py
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///:memory:

  # === 后端单元测试 ===
  ci-backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests/ -v --tb=short
          python -m coverage report -m --include=app/*
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///:memory:

  # === 代码风格检查 ===
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint backend (blocking)
        run: ruff check backend/app/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Lint frontend (blocking)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
