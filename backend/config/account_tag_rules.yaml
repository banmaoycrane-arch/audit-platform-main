# 科目与标签解析规则配置
# 版本: 1.0.0
# 说明: 此配置文件定义了科目解析时的规则，包括强制保留层级的科目、科目到Tag类别的映射等。
#       配置优先级: 数据库 > YAML文件 > 内置默认值

version: "1.0.0"

# 强制保留层级的科目编码（不得扁平化为Tag）
# 这些科目具有明确的会计准则/税法含义
mandatory_hierarchical_accounts:
  # 应交税费 - 应交增值税 明细
  - "2221.01.01"   # 进项税额
  - "2221.01.02"   # 销项税额抵减
  - "2221.01.03"   # 已交税金
  - "2221.01.04"   # 转出未交增值税
  - "2221.01.05"   # 销项税额
  - "2221.01.06"   # 出口退税
  - "2221.01.07"   # 进项税额转出
  - "2221.01.08"   # 出口抵减内销产品应纳税额
  - "2221.01.09"   # 减免税款
  - "2221.01.10"   # 转出多交增值税
  - "2221.01.11"   # 未交增值税（部分软件编码习惯）
  # 应交税费 - 未交增值税
  - "2221.10.01"   # 未交增值税
  # 应付职工薪酬 明细
  - "2211.01.01"   # 工资
  - "2211.01.02"   # 职工福利
  - "2211.01.03"   # 社会保险费
  - "2211.01.04"   # 住房公积金
  - "2211.01.05"   # 工会经费
  - "2211.01.06"   # 职工教育经费
  - "2211.01.07"   # 非货币性福利
  - "2211.01.08"   # 辞退福利
  - "2211.01.09"   # 股份支付

# 强制保留层级的科目名称关键词（兜底匹配）
mandatory_hierarchical_keywords:
  - "应交增值税"
  - "未交增值税"
  - "进项税额"
  - "销项税额"
  - "进项税额转出"
  - "已交税金"
  - "应付职工薪酬"

# 一级科目代码到Tag类别的映射
# 当该科目下级段作为辅助核算维度时，优先使用此分类
account_code_tag_category:
  "1122": "customer"          # 应收账款 -> 客户
  "1123": "customer"          # 预付账款 -> 客户/供应商
  "2202": "supplier"          # 应付账款 -> 供应商
  "2203": "customer"          # 预收账款 -> 客户
  "1221": "counterparty_object"  # 其他应收款 -> 往来对象
  "2241": "counterparty_object"  # 其他应付款 -> 往来对象
  "1403": "product"           # 原材料 -> 材料/产品
  "1405": "product"           # 库存商品 -> 产品
  "5001": "cost_element"      # 生产成本 -> 成本要素
  "5101": "cost_element"      # 制造费用 -> 成本要素
  "5401": "cost_element"      # 主营业务成本 -> 成本要素
  "6001": "product"           # 主营业务收入 -> 产品
  "6051": "product"           # 其他业务收入 -> 产品/项目
  "6601": "expense_type"      # 销售费用 -> 费用类型
  "6602": "expense_type"      # 管理费用 -> 费用类型
  "6603": "expense_type"      # 财务费用 -> 费用类型
  "6403": "tax_type"          # 营业税金及附加 -> 税费类型

# 科目名称关键词到Tag类别的映射（当科目代码未知时使用）
account_name_tag_category:
  "应收": "customer"
  "应付": "supplier"
  "预付": "supplier"
  "预收": "customer"
  "其他应收": "counterparty_object"
  "其他应付": "counterparty_object"
  "客户": "customer"
  "供应商": "supplier"
  "原材料": "material"
  "库存商品": "product"
  "生产成本": "cost_element"
  "制造费用": "cost_element"
  "主营业务成本": "cost_element"
  "主营业务收入": "product"
  "其他业务收入": "product"
  "销售费用": "expense_type"
  "管理费用": "expense_type"
  "财务费用": "expense_type"
  "研发费用": "expense_type"
  "税金及附加": "tax_type"

# 常见辅助核算维度关键词（用于从摘要中补充识别）
# 注意：每个类别内的关键词按长度降序排列，优先匹配更长的词
auxiliary_keywords:
  department:
    - "行政部"
    - "财务部"
    - "销售部"
    - "研发部"
    - "生产部"
    - "采购部"
    - "人力资源部"
    - "部"
    - "部门"
    - "中心"
    - "事业部"
    - "车间"
    - "工厂"
  project:
    - "PO-"
    - "SO-"
    - "项目"
    - "工程"
    - "课题"
    - "合同"
  region:
    - "北京"
    - "上海"
    - "广州"
    - "深圳"
    - "山西"
    - "杭州"
    - "成都"
    - "武汉"
    - "西安"
    - "重庆"
    - "天津"
    - "南京"
    - "苏州"
